<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GridAI — Настройки</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <script>
      (() => {
        const stored = localStorage.getItem('sr-theme') || 'auto';
        const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-bs-theme', stored === 'auto' ? preferred : stored);
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="portal.css" />
  </head>
  <body data-page="settings">
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand sr-brand" href="dashboard.html">
          <span class="sr-brand-mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="64" height="64" rx="16" fill="url(#bg)" />
              <rect x="12" y="14" width="24" height="24" rx="7" fill="#0F2033" stroke="#284A66" stroke-width="1.5" />
              <rect x="15.5" y="17.5" width="5.5" height="5.5" rx="2" fill="#16324B" />
              <rect x="23" y="17.5" width="5.5" height="5.5" rx="2" fill="url(#accent)" />
              <rect x="30.5" y="17.5" width="2.5" height="5.5" rx="1.25" fill="#16324B" />
              <rect x="15.5" y="25" width="5.5" height="5.5" rx="2" fill="url(#accent)" />
              <rect x="23" y="25" width="5.5" height="5.5" rx="2" fill="#16324B" />
              <rect x="30.5" y="25" width="2.5" height="5.5" rx="1.25" fill="url(#signal)" />
              <rect x="15.5" y="32.5" width="5.5" height="2.5" rx="1.25" fill="#16324B" />
              <rect x="23" y="32.5" width="5.5" height="2.5" rx="1.25" fill="url(#signal)" />
              <rect x="30.5" y="32.5" width="2.5" height="2.5" rx="1.25" fill="#16324B" />
              <path d="M45 18C49.4183 18 53 21.5817 53 26V31H48.5V26.5C48.5 24.0147 46.4853 22 44 22H41.5V18H45Z" fill="#EAF8FF" />
              <path d="M44 31H53V35.5H41.5V26H46V30C46 30.5523 45.5523 31 45 31H44Z" fill="#EAF8FF" />
              <path d="M41.5 43H53" stroke="#2AE4C8" stroke-width="3.2" stroke-linecap="round" />
              <path d="M41.5 49H50" stroke="#FDD76B" stroke-width="3.2" stroke-linecap="round" />
              <defs>
                <linearGradient id="bg" x1="6" y1="4" x2="58" y2="60" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#0A1626" />
                  <stop offset="1" stop-color="#12304A" />
                </linearGradient>
                <linearGradient id="accent" x1="18" y1="18" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#2AE4C8" />
                  <stop offset="1" stop-color="#31AFFF" />
                </linearGradient>
                <linearGradient id="signal" x1="31" y1="21" x2="38" y2="28" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#FDD76B" />
                  <stop offset="1" stop-color="#FF944D" />
                </linearGradient>
              </defs>
            </svg>
          </span>
          <span class="sr-brand-copy">
            <span class="sr-brand-title">GridAI</span>
            <span class="sr-brand-subtitle">Hiring Portal</span>
          </span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#sidebarMenu"
          aria-controls="sidebarMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="d-flex align-items-center gap-2">
          <a class="btn btn-outline-secondary" href="https://gridai.ru" target="_blank" rel="noreferrer">На сайт</a>
          <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
              Тема
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><button class="dropdown-item" data-sr-theme="light">Светлая</button></li>
              <li><button class="dropdown-item" data-sr-theme="dark">Темная</button></li>
              <li><button class="dropdown-item" data-sr-theme="auto">Авто</button></li>
            </ul>
          </div>
          <a class="btn btn-primary" href="https://t.me/GridAI_Recruiter_bot" target="_blank" rel="noreferrer">Открыть бота</a>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-body-tertiary sidebar collapse sr-sidebar">
          <div class="position-sticky pt-3">
            <ul class="nav flex-column">
              <li class="nav-item"><a class="nav-link" href="dashboard.html">Дашборд</a></li>
              <li class="nav-item"><a class="nav-link" href="reports.html">Отчёты</a></li>
              <li class="nav-item"><a class="nav-link" href="roles.html">Профили ролей</a></li>
              <li class="nav-item"><a class="nav-link" href="competitors.html">Конкуренты</a></li>
              <li class="nav-item"><a class="nav-link" href="template.html">Шаблон вакансии</a></li>
              <li class="nav-item"><a class="nav-link" href="team.html">Команда</a></li>
              <li class="nav-item"><a class="nav-link" href="billing.html">Тарифы</a></li>
              <li class="nav-item"><a class="nav-link active" href="settings.html">Настройки</a></li>
            </ul>
          </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
          <div class="d-flex flex-wrap justify-content-between align-items-center border-bottom pb-3 mb-4">
            <div>
              <h1 class="h3 mb-1">Настройки</h1>
              <p class="sr-muted mb-0">Лимиты, уведомления, интеграции.</p>
            </div>
          </div>

          <div class="alert alert-info d-none" data-sr-loading>Загружаем настройки…</div>
          <div class="alert alert-danger d-none" data-sr-error>Не удалось загрузить настройки.</div>
          <div class="row g-3">
            <div class="col-lg-6">
              <div class="card sr-card h-100">
                <div class="card-body">
                  <h3 class="h6">Уведомления</h3>
                  <div class="mt-3" id="sr-notifications"></div>
                </div>
              </div>
            </div>
            <div class="col-lg-6">
              <div class="card sr-card h-100">
                <div class="card-body">
                  <h3 class="h6">Лимиты</h3>
                  <div id="sr-limits"></div>
                  <button class="btn btn-outline-secondary btn-sm">Увеличить лимит</button>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../theme.js"></script>
    <script src="app.js"></script>
  </body>
</html>
