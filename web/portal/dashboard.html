<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SkillRadar — Дашборд</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <script>
      (() => {
        const stored = localStorage.getItem('sr-theme') || 'auto';
        const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-bs-theme', stored === 'auto' ? preferred : stored);
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="portal.css" />
  </head>
  <body data-page="dashboard">
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="dashboard.html">SkillRadar Portal</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#sidebarMenu"
          aria-controls="sidebarMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="d-flex align-items-center gap-2">
          <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
              Тема
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><button class="dropdown-item" data-sr-theme="light">Светлая</button></li>
              <li><button class="dropdown-item" data-sr-theme="dark">Темная</button></li>
              <li><button class="dropdown-item" data-sr-theme="auto">Авто</button></li>
            </ul>
          </div>
          <a class="btn btn-primary" href="https://t.me/skillradar_hr_bot" target="_blank" rel="noreferrer">Открыть бота</a>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-body-tertiary sidebar collapse sr-sidebar">
          <div class="position-sticky pt-3">
            <ul class="nav flex-column">
              <li class="nav-item"><a class="nav-link active" href="dashboard.html">Дашборд</a></li>
              <li class="nav-item"><a class="nav-link" href="reports.html">Отчёты</a></li>
              <li class="nav-item"><a class="nav-link" href="roles.html">Профили ролей</a></li>
              <li class="nav-item"><a class="nav-link" href="competitors.html">Конкуренты</a></li>
              <li class="nav-item"><a class="nav-link" href="template.html">Шаблон вакансии</a></li>
              <li class="nav-item"><a class="nav-link" href="team.html">Команда</a></li>
              <li class="nav-item"><a class="nav-link" href="billing.html">Тарифы</a></li>
              <li class="nav-item"><a class="nav-link" href="settings.html">Настройки</a></li>
            </ul>
          </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
          <div class="d-flex flex-wrap justify-content-between align-items-center border-bottom pb-3 mb-4">
            <div>
              <h1 class="h3 mb-1">Дашборд</h1>
              <p class="sr-muted mb-0">Ключевые метрики и свежая активность.</p>
            </div>
            <div class="btn-group">
              <button class="btn btn-outline-secondary btn-sm">Обновить</button>
              <button class="btn btn-primary btn-sm">Экспорт</button>
            </div>
          </div>

          <div class="row g-3 mb-4" id="sr-stats"></div>

          <div class="row g-3">
            <div class="col-lg-7">
              <div class="card sr-card h-100">
                <div class="card-body">
                  <h3 class="h6">Последние отчёты</h3>
                  <div class="table-responsive mt-3">
                    <table class="table table-sm align-middle">
                      <thead>
                        <tr>
                          <th>Роль</th>
                          <th>Регион</th>
                          <th>Дата</th>
                          <th>Статус</th>
                        </tr>
                      </thead>
                      <tbody id="sr-reports"></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-5">
              <div class="card sr-card h-100">
                <div class="card-body">
                  <h3 class="h6">Активность</h3>
                  <ul class="list-unstyled sr-muted mt-3" id="sr-activity"></ul>
                  <button class="btn btn-outline-secondary btn-sm mt-2">Открыть журнал</button>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../theme.js"></script>
    <script src="app.js"></script>
  </body>
</html>
