server {
  listen 80;
  server_name gridai.ru www.gridai.ru auth.gridai.ru career.gridai.ru hiring.gridai.ru admin.gridai.ru api.gridai.ru lk.gridai.ru;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name gridai.ru www.gridai.ru auth.gridai.ru career.gridai.ru hiring.gridai.ru admin.gridai.ru api.gridai.ru lk.gridai.ru;

  ssl_certificate /etc/letsencrypt/live/gridai.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gridai.ru/privkey.pem;

  client_max_body_size 20m;

  location = /healthz {
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  location /legacy/ {
    proxy_pass http://127.0.0.1:13080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    if ($host = api.gridai.ru) {
      rewrite ^/$ /v1/ permanent;
      rewrite ^/v1/(.*)$ /api/v1/$1 break;
    }

    if ($host = auth.gridai.ru) {
      rewrite ^/$ /career permanent;
    }

    if ($host = career.gridai.ru) {
      rewrite ^/$ /career/dashboard.html permanent;
    }

    if ($host = hiring.gridai.ru) {
      rewrite ^/$ /hiring/dashboard.html permanent;
    }

    if ($host = lk.gridai.ru) {
      return 301 https://hiring.gridai.ru$request_uri;
    }

    if ($host = admin.gridai.ru) {
      rewrite ^/$ /hiring/settings.html permanent;
    }

    if ($host = gridai.ru) {
      rewrite ^/(login|sign-in|signin|oauth/.*|career|hiring)$ https://auth.gridai.ru/$1 permanent;
      rewrite ^/portal(.*)$ https://hiring.gridai.ru/hiring$1 permanent;
      rewrite ^/career(.*)$ https://career.gridai.ru/career$1 permanent;
      rewrite ^/hiring(.*)$ https://hiring.gridai.ru/hiring$1 permanent;
      rewrite ^/admin(.*)$ https://admin.gridai.ru$uri$is_args$args permanent;
      rewrite ^/api/(.*)$ https://api.gridai.ru/$1 permanent;
    }

    if ($host = www.gridai.ru) {
      rewrite ^/(login|sign-in|signin|oauth/.*|career|hiring)$ https://auth.gridai.ru/$1 permanent;
      rewrite ^/portal(.*)$ https://hiring.gridai.ru/hiring$1 permanent;
      rewrite ^/career(.*)$ https://career.gridai.ru/career$1 permanent;
      rewrite ^/hiring(.*)$ https://hiring.gridai.ru/hiring$1 permanent;
      rewrite ^/admin(.*)$ https://admin.gridai.ru$uri$is_args$args permanent;
      rewrite ^/api/(.*)$ https://api.gridai.ru/$1 permanent;
    }

    proxy_pass http://127.0.0.1:13001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
