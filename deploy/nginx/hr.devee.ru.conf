server {
  listen 80;
  server_name hr.devee.ru;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name hr.devee.ru;

  ssl_certificate /etc/letsencrypt/live/devee.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/devee.ru/privkey.pem;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://127.0.0.1:13001/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /oauth/ {
    proxy_pass http://127.0.0.1:13001/oauth/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Optional legacy static frontend/admin pages from /web
  location /legacy/ {
    proxy_pass http://127.0.0.1:13080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://127.0.0.1:13001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection \"upgrade\";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
