version: "3.9"

services:
  web:
    build: .
    container_name: skillradar-web
    env_file:
      - .env
    environment:
      - WEB_PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  bot:
    build: .
    container_name: skillradar-bot
    env_file:
      - .env
    environment:
      - DISABLE_WEB=true
    command: ["npm", "run", "start"]
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('https://api.telegram.org').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 60s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: skillradar-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/skillradar.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  monitor:
    image: docker:24-cli
    container_name: skillradar-monitor
    depends_on:
      - web
      - bot
      - nginx
    environment:
      - ALERT_URL=http://web:3000
      - ALERT_INTERVAL=60
      - ALERT_BOT_CONTAINER=skillradar-bot
      - ALERT_NGINX_CONTAINER=skillradar-nginx
      - ALERT_ON_5XX=true
      - ALERT_TG_BOT_TOKEN=${ALERT_TG_BOT_TOKEN}
      - ALERT_TG_CHAT_ID=${ALERT_TG_CHAT_ID}
    volumes:
      - ./deploy/monitor/healthcheck.sh:/healthcheck.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["/bin/sh", "/healthcheck.sh"]
    restart: unless-stopped
