version: "3.9"

services:
  web:
    build: .
    container_name: gridai-web
    env_file:
      - .env
    environment:
      - WEB_PORT=3000
      - DISABLE_BOT=true
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-13001}:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.WEB_PORT || 3000)).then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: nginx:1.27-alpine
    container_name: gridai-frontend
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./deploy/nginx/frontend-static.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-13080}:80"
    restart: unless-stopped

  bot:
    build: .
    container_name: gridai-bot
    env_file:
      - .env
    environment:
      - DISABLE_WEB=true
    command: ["npm", "run", "start"]
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('https://api.telegram.org').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 60s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: gridai-nginx
    profiles: ["standalone-edge"]
    ports:
      - "127.0.0.1:${EDGE_NGINX_HOST_PORT:-18088}:80"
    volumes:
      - ./deploy/nginx/gridai.ru.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  monitor:
    image: docker:24-cli
    container_name: gridai-monitor
    depends_on:
      - web
      - bot
      - frontend
    environment:
      - ALERT_URL=http://web:3000
      - ALERT_INTERVAL=60
      - ALERT_BOT_CONTAINER=gridai-bot
      - ALERT_NGINX_CONTAINER=${ALERT_NGINX_CONTAINER:-}
      - ALERT_ON_5XX=true
      - ALERT_TG_BOT_TOKEN=${ALERT_TG_BOT_TOKEN}
      - ALERT_TG_CHAT_ID=${ALERT_TG_CHAT_ID}
    volumes:
      - ./deploy/monitor/healthcheck.sh:/healthcheck.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["/bin/sh", "/healthcheck.sh"]
    restart: unless-stopped
